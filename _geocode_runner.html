async function jget(u){try{const r=await fetch(u);return await r.json();}catch(e){return null;}}
async function geocodeAddr(t){
  const tries=[];
  if(t.b) tries.push(BASE+'&adressenavn='+encodeURIComponent(t.an)+'&nummer='+encodeURIComponent(t.nr)+'&bokstav='+encodeURIComponent(t.b));
